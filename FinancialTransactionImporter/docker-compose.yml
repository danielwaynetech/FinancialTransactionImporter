version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: src/TransactionImporter.API/Dockerfile
    container_name: transaction-importer-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/transactions.db"
      CsvSettings__Delimiter: ";"
      CsvSettings__DateFormat: "yyyy-MM-dd HH:mm:ss"
      CsvSettings__MaxAbsoluteAmount: "9999999.99"
      ApiKey: "transaction-api-key"
    volumes:
      - db_data:/app/data
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_API_KEY: "transaction-api-key"
    container_name: transaction-importer-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge