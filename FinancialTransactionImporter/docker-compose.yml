version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: src/TransactionImporter.API/Dockerfile
    container_name: transaction-importer-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/transactions.db"
      CsvSettings__Delimiter: ","
      CsvSettings__DateFormat: "yyyy-MM-dd HH:mm:ss"
      CsvSettings__MaxAbsoluteAmount: "9999999.99"
      ApiKey: "transaction-api-key"
    volumes:
      - db_data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/openapi/v1.json || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_API_KEY: "dev-api-key-change-me-in-production"
    container_name: transaction-importer-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge
